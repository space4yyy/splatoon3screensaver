name: Build Screensaver Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build .saver artifact
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build screensaver
        run: make package

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: splatoon3-boot.saver
          path: dist/splatoon3-boot.saver
          if-no-files-found: error
