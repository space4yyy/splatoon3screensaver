name: Build Screensaver Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build .saver package
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build package
        run: make package

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Splatoon3Screensaver
          path: dist/Splatoon3Screensaver.saver.zip
          if-no-files-found: error

      - name: Attach package to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Splatoon3Screensaver.saver.zip
